name: Build Small Tailscale

on:
  push:
    branches:
      - develop
  repository_dispatch:
    types: [upstream_release]
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Build specific version (e.g. v1.50.0). Leave empty for auto-detect.'
        required: false
        default: ''
      skip_check:
        description: 'Skip version check and force build?'
        type: boolean
        required: false
        default: false

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      version: ${{ steps.check.outputs.version }}
      build_tags: ${{ steps.define_tags.outputs.tags }}
    steps:
      - name: Define Build Tags
        id: define_tags
        run: |
          # --- 追加タグ定義 ---
          # must
          TAGS_BASE="osrouter,debug,unixsocketidentity"
          
          # networks (netstack depends on clientmetrics)
          #TAGS_NET="dns,listenrawdisco,portmapper"
          TAGS_NET="clientmetrics,dns,listenrawdisco,netstack,portmapper"
          
          # manage
          TAGS_MANAGE="bakedroots,c2n,oauthkey"
          
          # os
          TAGS_OS="iptables,linkspeed,linuxdnsfight"
          
          # optimize (gro depends on clientmetrics)
          #TAGS_OPT="lazywg"
          TAGS_OPT="gro,lazywg"
          
          # features
          TAGS_FEAT="advertiseexitnode,advertiseroutes,useexitnode,useroutes"
          
          # utilities (ssh depends on clientmetrics)
          TAGS_UTIL="wakeonlan"
          
          # 全タグをカンマ区切りで結合
          ALL_TAGS="${TAGS_BASE},${TAGS_NET},${TAGS_MANAGE},${TAGS_OS},${TAGS_OPT},${TAGS_FEAT},${TAGS_UTIL}"
          
          echo "Tags defined: $ALL_TAGS"
          echo "tags=$ALL_TAGS" >> $GITHUB_OUTPUT
          
      - name: Check version
        id: check
        run: |
          # 手動入力がある場合はそちらを優先
          INPUT_VER="${{ inputs.force_version }}"
          SKIP_CHECK="${{ inputs.skip_check }}"
          
          # 公式の最新タグを取得
          LATEST_TAG=$(curl -s https://api.github.com/repos/tailscale/tailscale/releases/latest | jq -r .tag_name)
          
          # 自分のリポジトリの最新リリースを取得
          MY_LATEST=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name || echo "v0.0.0")

          echo "Upstream: $LATEST_TAG"
          echo "Current: $MY_LATEST"
          echo "Input: $INPUT_VER"

          if [ -n "$INPUT_VER" ]; then
            echo "Manual version specified."
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "version=$INPUT_VER" >> $GITHUB_OUTPUT
          elif [ "$SKIP_CHECK" == "true" ]; then
             echo "Skipping check, forcing build of $LATEST_TAG"
             echo "should_run=true" >> $GITHUB_OUTPUT
             echo "version=$LATEST_TAG" >> $GITHUB_OUTPUT
          elif [ "$LATEST_TAG" != "$MY_LATEST" ] || [ "${{ github.event_name }}" == "repository_dispatch" ] || [ "${{ github.event_name }}" == "push" ]; then
            echo "New version, repository_dispatch, or push to develop detected."
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "version=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "Already up to date."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: init
    if: needs.init.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # --- x86 ---
          - goarch: 386
            openwrt_archs: "i386_pentium-mmx i386_pentium4"

          # --- ARM64 (Raspberry Pi 4, NanoPi, etc.) ---
          - goarch: arm64
            openwrt_archs: "aarch64_cortex-a53 aarch64_cortex-a72 aarch64_cortex-a76 aarch64_generic"

          # --- ARMv7 (Raspberry Pi 2/3, etc.) ---
          - goarch: arm
            goarm: 7
            openwrt_archs: "arm_cortex-a5_vfpv4 arm_cortex-a7 arm_cortex-a7_neon-vfpv4 arm_cortex-a7_vfpv4 arm_cortex-a8_vfpv3 arm_cortex-a9 arm_cortex-a9_neon arm_cortex-a9_vfpv3-d16 arm_cortex-a15_neon-vfpv4"

          # --- ARMv6 (Raspberry Pi 1 / Zero) ---
          - goarch: arm
            goarm: 6
            openwrt_archs: "arm_arm1176jzf-s_vfp"

          # --- ARMv5 ---
          - goarch: arm
            goarm: 5
            openwrt_archs: "arm_arm926ej-s arm_xscale"

          # --- MIPS Big Endian (Atheros AR7xxx/AR9xxx, QCA9xxx) ---
          - goarch: mips
            gomips: softfloat
            openwrt_archs: "mips_24kc mips_4kec mips_mips32"

          # --- MIPS Little Endian (MediaTek MT76x8, Omega2, etc.) ---
          - goarch: mipsle
            gomips: softfloat
            openwrt_archs: "mipsel_24kc mipsel_24kc_24kf mipsel_74kc mipsel_mips32"

          # --- RISC-V ---
          - goarch: riscv64
            openwrt_archs: "riscv64_riscv64"

          # --- PowerPC64 ---
          - goarch: ppc64
            openwrt_archs: "powerpc64_e5500"

          # --- x86_64 ---
          - goarch: amd64
            openwrt_archs: "x86_64"

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: my-repo

      - name: Checkout Tailscale
        uses: actions/checkout@v4
        with:
          repository: tailscale/tailscale
          ref: ${{ needs.init.outputs.version }}
          path: tailscale-src
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: tailscale-src/go.mod
          cache-dependency-path: tailscale-src/go.sum

      - name: Install UPX
        run: sudo apt-get install -y upx-ucl

      - name: Build Small Tailscale
        working-directory: tailscale-src
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: 0
          ALL_TAGS: ${{ needs.init.outputs.build_tags }}
        run: |
          # --extra-small オプション処理内の featuretags 実行引数に各タグを追加
          sed -i "s/--add=osrouter/--add=${ALL_TAGS}/" build_dist.sh

          chmod +x ./build_dist.sh
          echo "Building tailscale.combined for $GOARCH using build_dist.sh..."
          ./build_dist.sh --extra-small --box -o ../tailscale.combined ./cmd/tailscaled

      - name: Compress binaries with UPX
        run: |
          upx --best --lzma tailscale.combined || echo "Warning: UPX compression failed for tailscale.combined (Arch: ${{ matrix.goarch }}). Using uncompressed binary."

      - name: Package into IPK and APK
        run: |
          VERSION=${{ needs.init.outputs.version }}
          VERSION_NUM=${VERSION#v}
          
          # 出力先ディレクトリ
          mkdir -p artifacts
          
          # アーキテクチャリストをループ
          for ARCH in ${{ matrix.openwrt_archs }}; do
            echo "Packaging for $ARCH..."
            
            # ビルド用の一時ディレクトリをクリーンアップ
            rm -rf ipk_build apk_build
            mkdir -p ipk_build/data/usr/sbin
            mkdir -p ipk_build/data/etc/config
            mkdir -p ipk_build/data/etc/init.d
            mkdir -p ipk_build/data/lib/upgrade/keep.d
            mkdir -p ipk_build/control
            
            # --- data ---
            cp tailscale.combined ipk_build/data/usr/sbin/
            cd ipk_build/data/usr/sbin
            ln -s tailscale.combined tailscale
            ln -s tailscale.combined tailscaled
            cd ../../../..

            cp my-repo/openwrt/data/tailscale.config ipk_build/data/etc/config/tailscale
            cp my-repo/openwrt/data/tailscale.init ipk_build/data/etc/init.d/tailscale
            cp my-repo/openwrt/data/tailscale.keep ipk_build/data/lib/upgrade/keep.d/tailscale
            chmod +x ipk_build/data/etc/init.d/tailscale
            
            # build data.tar.gz
            cd ipk_build/data
            tar --numeric-owner --group=0 --owner=0 -czf ../data.tar.gz *
            cd ../..
            
            # dataのサイズを計算して Installed-Size に設定
            SIZE=$(du -sb ipk_build/data | awk '{ print $1 }')
            
            # --- .ipk ---
            # --- control for .ipk ---
            cp my-repo/openwrt/control/conffiles ipk_build/control/conffiles
            cp my-repo/openwrt/control/control ipk_build/control/control
            cp my-repo/openwrt/control/postinst ipk_build/control/postinst
            cp my-repo/openwrt/control/prerm ipk_build/control/prerm
            chmod 755 ipk_build/control/postinst ipk_build/control/prerm

            sed -i "s/VERSION_PLACEHOLDER/$VERSION_NUM/g" ipk_build/control/control
            sed -i "s/ARCH_PLACEHOLDER/$ARCH/g" ipk_build/control/control
            
            echo "Installed-Size: $SIZE" >> ipk_build/control/control
            
            # build control.tar.gz
            cd ipk_build/control
            tar --numeric-owner --group=0 --owner=0 -czf ../control.tar.gz *
            cd ../..
            
            # --- .ipk packaging (unsign) ---
            echo "2.0" > ipk_build/debian-binary
            cd ipk_build
            IPK_NAME="tailscale_${VERSION_NUM}_${ARCH}.ipk"
            tar --numeric-owner --group=0 --owner=0 -czf "$IPK_NAME" debian-binary control.tar.gz data.tar.gz
            
            # 生成物を退避
            mv "$IPK_NAME" ../artifacts/
            cd ..

            # --- .apk ---
            echo "Building APK for $ARCH..."
            mkdir -p apk_build/control
            cp ipk_build/data.tar.gz apk_build/data.tar.gz
            
            # APKのメタデータ(.PKGINFO)を作成
            {
              echo "# Generated by GitHub Actions"
              echo "pkgname = tailscale"
              echo "pkgver = ${VERSION_NUM}-r1"
              echo "pkgdesc = Auto-generated small build for OpenWrt."
              echo "url = https://github.com/${{ github.repository }}"
              echo "builddate = $(date +%s)"
              echo "packager = GitHub Actions <github-actions[bot]@users.noreply.github.com>"
              echo "size = $SIZE"
              echo "arch = $ARCH"
            } > apk_build/control/.PKGINFO

            # --- control for .apk ---
            # インストールフックスクリプトをAPK仕様に変換 (インストール前後/アップグレード前後に対応)
            cp my-repo/openwrt/control/postinst apk_build/control/.post-install
            cp my-repo/openwrt/control/postinst apk_build/control/.post-upgrade
            cp my-repo/openwrt/control/prerm apk_build/control/.pre-deinstall
            cp my-repo/openwrt/control/prerm apk_build/control/.pre-upgrade
            chmod 755 apk_build/control/.post-* apk_build/control/.pre-*
            
            # build control.tar.gz
            cd apk_build/control
            # dotglob を有効にして、* が隠しファイルにもマッチするようにする
            shopt -s dotglob
            tar --numeric-owner --group=0 --owner=0 -czf ../control.tar.gz *
            shopt -u dotglob
            cd ../..
            
            # --- .apk packaging (unsign) ---
            cd apk_build
            APK_NAME="tailscale_${VERSION_NUM}_${ARCH}.apk"
            cat control.tar.gz data.tar.gz > "$APK_NAME"
            
            # 生成物を退避
            mv "$APK_NAME" ../artifacts/
            cd ..

          done
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailscale_pkgs_${{ matrix.goarch }}_${{ matrix.goarm || '0' }}
          path: |
            artifacts/*.ipk
            artifacts/*.apk

  release:
    needs: [init, build]
    if: needs.init.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.init.outputs.version }}
          name: Small Tailscale ${{ needs.init.outputs.version }}
          body: |
            Auto-generated small build for OpenWrt.
            Upstream: https://github.com/tailscale/tailscale/releases/tag/${{ needs.init.outputs.version }}
            
            **Build Tags:** `${{ needs.init.outputs.build_tags }}`
            **Build Flags:** `--extra-small --box`
            **Compression:** UPX --best --lzma
          files: |
            artifacts/*.ipk
            artifacts/*.apk
          prerelease: ${{ github.ref == 'refs/heads/develop' }}

  deploy-repo:
    needs: [init, build]
    if: needs.init.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: repo-page
        continue-on-error: true

      - name: Initialize Repo Directory
        run: |
          if [ ! -d "repo-page" ]; then
            mkdir repo-page
            cd repo-page
            git init
            git checkout -b gh-pages
            cd ..
          fi

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Index and Sign
        env:
          USIGN_KEY: ${{ secrets.USIGN_PRIVATE_KEY }}
          APK_KEY: ${{ secrets.APK_PRIVATE_KEY }}
        run: |
          cd repo-page
          echo "$USIGN_KEY" > key.sec
          echo "$APK_KEY" > apk_key.rsa
          
          # ipkとapkを配置
          find ../artifacts -type f \( -name "*.ipk" -o -name "*.apk" \) | while read PKG; do
            echo "Processing $PKG..."
            # ファイル名からアーキテクチャ名を抽出 (例: tailscale_1.50.0_x86_64.apk -> x86_64)
            ARCH_NAME=$(basename "$PKG" | sed -E 's/^tailscale_[^_]+_([^\.]+)\.(ipk|apk)$/\1/')
            mkdir -p "$ARCH_NAME"
            rm -f "$ARCH_NAME"/$(basename "$PKG")
            cp "$PKG" "$ARCH_NAME"/
          done
          
          # --- IPK のインデックス生成と署名 (OpenWrt rootfs コンテナを使用) ---
          for ARCH_DIR in */; do
            if [ -d "$ARCH_DIR" ] && ls "$ARCH_DIR"/*.ipk >/dev/null 2>&1; then
              cd "$ARCH_DIR"
              echo "Generating IPK index for $ARCH_DIR..."
              echo "" > Packages
              for IPK in *.ipk; do
                tar -xzOf "$IPK" control.tar.gz | tar xzO control >> Packages
                echo "Filename: $IPK" >> Packages
                echo "Size: $(stat -c%s "$IPK")" >> Packages
                echo "SHA256sum: $(sha256sum "$IPK" | cut -d' ' -f1)" >> Packages
                echo "" >> Packages
              done
              gzip -k -f Packages

              echo "Signing Packages (IPK)..."
              docker run --rm -v "$GITHUB_WORKSPACE/repo-page":/work -w "/work/$ARCH_DIR" openwrt/rootfs:x86-64-23.05.5 \
                usign -S -m Packages -s ../key.sec -x Packages.sig
              cd ..
            fi
          done

          # --- APK の署名とインデックス生成 (Alpine コンテナを使用) ---
          echo "Signing and indexing APKs..."
          docker run --rm -v "$GITHUB_WORKSPACE/repo-page":/work -w /work alpine:latest sh -c "
            apk add --no-cache abuild
            # 秘密鍵を abuild が認識できる場所にコピー
            mkdir -p /etc/apk/keys
            cp apk_key.rsa /etc/apk/keys/
            
            for ARCH_DIR in */ ; do
              if [ -d \"\$ARCH_DIR\" ] && ls \"\$ARCH_DIR\"/*.apk >/dev/null 2>&1; then
                cd \"\$ARCH_DIR\"
                echo \"Signing APKs in \$ARCH_DIR...\"
                # for APK in *.apk; do
                  # 未署名apkに署名を付加 (元のファイルを自動で上書きします)
                  # abuild-sign -q -k ../apk_key.rsa \"\$APK\"
                # done
                
                echo \"Generating APK index for \$ARCH_DIR...\"
                apk index -o APKINDEX.tar.gz *.apk
                abuild-sign -q -k ../apk_key.rsa APKINDEX.tar.gz
                cd ..
              fi
            done
          "

          # 不要な空ディレクトリがあれば削除
          for ARCH_DIR in */; do
            if [ -d "$ARCH_DIR" ]; then
              if ! ls "$ARCH_DIR"/*.ipk >/dev/null 2>&1 && ! ls "$ARCH_DIR"/*.apk >/dev/null 2>&1; then
                echo "Skipping and removing $ARCH_DIR (no packages found)"
                rm -rf "$ARCH_DIR"
              fi
            fi
          done
          
          rm -f key.sec apk_key.rsa

      - name: Deploy to GitHub Pages
        working-directory: repo-page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          # 変更がない場合のエラー回避
          git commit -m "Update repo ${{ needs.init.outputs.version }}" || echo "No changes to commit"

          # 強制プッシュで履歴を上書きしないとリポジトリが肥大化するため注意
          # 容量節約なら --force 推奨
          git push origin HEAD:gh-pages